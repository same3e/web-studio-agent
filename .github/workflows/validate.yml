name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin:
    permissions:
      contents: read
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml
      - run: pwsh -File scripts/validate_migration.ps1
      - run: pwsh -File scripts/test_powershell_syntax.ps1
      - run: pwsh -File scripts/test_record_contract_integrity.ps1
      - run: pwsh -File scripts/test_release_documentation_consistency.ps1
      - run: pwsh -File scripts/test_security_perimeter.ps1
      - run: pwsh -File scripts/test_reference_security.ps1
      - run: pwsh -File scripts/test_phase1_behavioral.ps1
      - run: pwsh -File scripts/test_phase1_runtime.ps1
      - run: pwsh -File scripts/test_phase2_contracts.ps1
      - run: pwsh -File scripts/test_phase3.ps1
      - run: pwsh -File scripts/test_phase4.ps1
      - run: pwsh -File scripts/test_frontend_rules.ps1
      - run: pwsh -File scripts/test_code_quality.ps1
      - run: pwsh -File scripts/test_context_efficiency.ps1
      - run: pwsh -File scripts/context/build_rule_route_index.ps1 -Check
      - run: pwsh -File scripts/test_false_guarantees.ps1
      - run: pwsh -File scripts/test_runtime_and_specialist_orchestration.ps1
      - run: git diff --check
